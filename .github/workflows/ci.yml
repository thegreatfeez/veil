name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit — cargo audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: contracts

  contracts:
    name: Rust contracts — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - run: cargo build --all
      # cargo test is temporarily disabled — stellar-xdr 20.1.0 transitively
      # pulls a broken `arbitrary` feature on fresh CI builds. See issue #79.

  sdk:
    name: SDK — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci || npm install
      - run: npx tsc --noEmit
      - run: npm test --if-present

  wallet:
    name: Wallet frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/wallet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/wallet/package-lock.json
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run build
        # gitguardian:ignore=true — public testnet values (NEXT_PUBLIC_* are browser-exposed)
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_FACTORY_CONTRACT_ID: CAGFEJM4FBYZMMZ364MINCEZO6MT7U7VMJSXQLR6UDYT7ICDLJUXWJIR
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

  agent:
    name: Agent — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/agent/package-lock.json
      - run: npm ci || npm install
      - run: npx tsc --noEmit
      - run: npm run build

  lighthouse-ci:
    name: Wallet PWA — Lighthouse performance budget
    runs-on: ubuntu-latest
    needs: wallet
    defaults:
      run:
        working-directory: frontend/wallet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/wallet/package-lock.json
      - run: npm ci || npm install
      - run: npm run build
        # gitguardian:ignore=true — public testnet values (NEXT_PUBLIC_* are browser-exposed)
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_FACTORY_CONTRACT_ID: CAGFEJM4FBYZMMZ364MINCEZO6MT7U7VMJSXQLR6UDYT7ICDLJUXWJIR
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@latest

      - name: Start Next.js server
        run: npx next start -p 3000 &
        shell: bash

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run Lighthouse CI
        run: lhci autorun

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'frontend/wallet/.lhci/results/lhci_summary.json';
            
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf-8'));
              
              let comment = '📊 **Lighthouse Performance Audit Results**\n\n';
              comment += '| Category | Score | Threshold |\n';
              comment += '|----------|-------|----------|\n';
              comment += `| Performance | ${(results.scores.performance * 100).toFixed(0)}/100 | ≥ 80 |\n`;
              comment += `| Accessibility | ${(results.scores.accessibility * 100).toFixed(0)}/100 | ≥ 90 |\n`;
              comment += `| PWA | ${(results.scores.pwa * 100).toFixed(0)}/100 | ≥ 80 |\n`;
              comment += `| Best Practices | ${(results.scores['best-practices'] * 100).toFixed(0)}/100 | ≥ 90 |\n\n`;
              comment += `📈 [View full report](${results.reportUrl})\n`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
